<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blossom Wardrobe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    display:flex;
    justify-content:center;
    background:#f6cfe0;
}

/* APP */
.app{
    width:100%;
    max-width:420px;
    min-height:100vh;
    background: linear-gradient(180deg,#ffe0ec,#ffd1e6);
    box-shadow:0 0 40px rgba(0,0,0,0.15);
}

/* HEADER */
.topbar{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding:14px 10px;
    border-bottom:1px solid rgba(255,105,180,0.2);
}

.brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

/* ONLY ONE LOGO */
.logo{
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:rgba(255,105,180,0.08);
}

/* TEXT */
.text h1{
    font-size:18px;
    color:#ff4d88;
}

.text p{
    font-size:11px;
    color:#ff6fa3;
}

/* PRODUCTS */
.container{
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:14px;
    padding-bottom:100px;
}

/* CARD */
.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
    transition:0.2s ease;
}

.card.active{
    transform: scale(1.02);
    box-shadow:0 18px 35px rgba(255,77,136,0.25);
}

/* IMAGE */
.img{
    width:100%;
    aspect-ratio:16/9;
}

.img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.content{
    padding:12px;
}

.code{
    font-size:11px;
    color:#aaa;
}

.name{
    font-size:15px;
    font-weight:600;
}

.price{
    font-size:15px;
    color:#ff4d88;
    font-weight:700;
    margin-top:4px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(45deg,#ff4d88,#ff7fb3);
    color:white;
    font-size:14px;
    font-weight:600;
}

button:active{
    transform: scale(0.97);
}

/* INSTRUCTION */
.instruction{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:360px;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    padding:15px;
    display:none;
    z-index:999;
}

.instruction h3{
    font-size:15px;
    color:#ff4d88;
    margin-bottom:6px;
}

.instruction p{
    font-size:12px;
    color:#444;
    line-height:1.4;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="topbar">
    <div class="brand">

        <!-- ONLY ONE LOGO -->
        <div class="logo">
            <svg viewBox="0 0 100 100" width="34" height="34">
                <circle cx="50" cy="30" r="12" fill="#ff4d88"/>
                <circle cx="30" cy="50" r="12" fill="#ff7fb3"/>
                <circle cx="70" cy="50" r="12" fill="#ff9ecb"/>
                <circle cx="50" cy="70" r="12" fill="#ff6fa3"/>
                <circle cx="50" cy="50" r="10" fill="#ffffff"/>
            </svg>
        </div>

        <div class="text">
            <h1>Blossom Wardrobe</h1>
            <p>tap to order instantly</p>
        </div>

    </div>
</div>

<!-- PRODUCTS -->
<div class="container">

<div class="card">
    <div class="img">
        <img src="Item_1.jpg">
    </div>
    <div class="content">
        <div class="code">A1</div>
        <div class="name">cute crop top</div>
        <div class="price">₱199</div>
        <button onclick="mine('A1','cute crop top', this)">MINE</button>
    </div>
</div>

<div class="card">
    <div class="img">
        <img src="Item_2.jpg">
    </div>
    <div class="content">
        <div class="code">B2</div>
        <div class="name">soft hoodie</div>
        <div class="price">₱399</div>
        <button onclick="mine('B2','soft hoodie', this)">MINE</button>
    </div>
</div>

</div>

</div>

<!-- INSTRUCTION -->
<div class="instruction" id="instruction">
    <h3>Order Ready</h3>
    <p id="msg"></p>
    <button onclick="goMessenger()">Continue to Messenger</button>
</div>

<script>

let currentMsg = "";

function mine(code,name,btn){

let card = btn.closest(".card");
card.classList.add("active");
setTimeout(()=>card.classList.remove("active"),200);

currentMsg =
`ORDER REQUEST

Product: ${name}
Code: ${code}

Hi! I want to order this item. Please assist me.`;

// show
document.getElementById("msg").innerText = currentMsg;
document.getElementById("instruction").style.display = "block";

// copy
navigator.clipboard.writeText(currentMsg);
}

function goMessenger(){
window.open("https://m.me/mark.mark.mark17","_blank");
document.getElementById("instruction").style.display = "none";
}
</script>

</body>
</html>
